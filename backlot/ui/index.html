<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Backlot — 素材库</title>
<link rel="stylesheet" href="/ui/board.css">
</head>
<body>
<div class="wrap">
  <header class="slate">
    <div class="clapper"></div>
    <div>
      <span class="wordmark">Backlot</span>
      <h1>素材库</h1>
    </div>
    <span class="chip" id="count"></span>
    <div class="spacer"></div>
    <span class="live idle" id="liveBadge"><span class="dot"></span><span id="liveText">空闲</span></span>
    <button class="new-project-btn" id="newProjectBtn" onclick="showNewProjectDialog()">+ 新建项目</button>
  </header>
  <div class="lib-grid" id="grid"></div>
  <p class="hint" id="empty" style="display:none">还没有项目 — 运行一次制作流程后，项目会显示在这里。</p>
</div>
<script type="module" src="/ui/library.js"></script>
<div class="modal-overlay" id="newProjectModal" style="display:none">
  <div class="modal-dialog">
    <h2>新建项目</h2>
    <div class="modal-field">
      <label>项目标题</label>
      <input type="text" id="newProjectTitle" placeholder="输入项目标题" />
    </div>
    <div class="modal-field">
      <label>流水线类型</label>
      <select id="newProjectPipeline"></select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="hideNewProjectDialog()">取消</button>
      <button class="btn-confirm" onclick="createProject()">创建</button>
    </div>
  </div>
</div>
</body>
</html>
