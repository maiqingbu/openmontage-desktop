name: 构建 Windows 安装包

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller fastapi "uvicorn[standard]" pydantic requests email-validator

      - name: 打包 Backlot sidecar（PyInstaller）
        working-directory: packaging
        run: |
          python -m PyInstaller --clean --noconfirm backlot-server.spec
          New-Item -ItemType Directory -Force -Path ..\desktop-shell\src-tauri\binaries | Out-Null
          Copy-Item dist\backlot-server.exe ..\desktop-shell\src-tauri\binaries\backlot-server-x86_64-pc-windows-msvc.exe

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装前端依赖
        working-directory: desktop-shell
        run: npm install

      - name: 构建 Tauri 安装包（NSIS）
        working-directory: desktop-shell
        run: npx tauri build --bundles nsis

      - name: 上传 Windows 安装包
        uses: actions/upload-artifact@v4
        with:
          name: OpenMontage-windows-setup
          path: desktop-shell/src-tauri/target/release/bundle/nsis/*.exe
